---
- name: Download Google Linux signing key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /etc/apt/keyrings/google-chrome.asc
    mode: "0644"

- name: Add Google Chrome APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ apt_architecture }} signed-by=/etc/apt/keyrings/google-chrome.asc] https://dl.google.com/linux/chrome/deb/ stable main"
    filename: google-chrome
    state: present

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present