---
- name: Verify sudo-rs on Ubuntu 26.04
  hosts: localhost
  become_exe: /usr/bin/sudo.ws
  become: true
  tasks:
    - name: Check sudo version
      ansible.builtin.command: sudo --version
      register: sudo_version
      changed_when: false

    - name: Display sudo implementation
      ansible.builtin.debug:
        msg: >-
          {% if 'sudo-rs' in sudo_version.stdout %}
          ✅ sudo-rs (Rust) — {{ sudo_version.stdout_lines[0] }}
          {% else %}
          ⚠️ Original sudo (C) — {{ sudo_version.stdout_lines[0] }}
          {% endif %}

    - name: Verify sudoers syntax is valid
      ansible.builtin.command: visudo -c
      register: sudoers_check
      changed_when: false
      failed_when: sudoers_check.rc != 0
